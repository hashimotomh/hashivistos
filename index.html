<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Notas - Robótica</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card-consulta { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: var(--primary); text-align: center; margin-top: 0; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 12px 20px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .resultado { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .info-aluno { margin-bottom: 15px; }
        .info-aluno b { color: #1e293b; font-size: 1.1em; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .check { color: #10b981; font-weight: bold; }
        .pendente { color: #ef4444; }
        .nota-final { text-align: center; margin-top: 20px; padding: 15px; background: #f8fafc; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

<div class="card-consulta">
    <h2>🚀 Portal do Aluno</h2>
    <p style="text-align: center; color: #64748b; font-size: 0.9em;">Digite seu código para ver seu progresso.</p>
    
    <div class="input-group">
        <input type="text" id="cod-aluno" placeholder="Seu código (Ex: 101)" onkeypress="if(event.key==='Enter') buscarNotas()">
        <button onclick="buscarNotas()">Ver</button>
    </div>

    <div id="resultado" class="resultado">
        <div class="info-aluno">
            <span>Aluno: </span><b id="nome-exibicao">---</b><br>
            <span>Turma: </span><span id="turma-exibicao">---</span>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Atividade</th>
                    <th style="text-align: center;">Status</th>
                </tr>
            </thead>
            <tbody id="lista-atividades"></tbody>
        </table>

        <div class="nota-final" id="media-exibicao">Média: 0.0</div>
    </div>
    
    <div id="msg-erro" style="color: #ef4444; text-align: center; display: none; margin-top: 10px;">Código não encontrado.</div>
</div>

<script>
// --- CONFIGURAÇÃO (Use a mesma do seu sistema) ---
const firebaseConfig = {
  apiKey: "AIzaSyAXeJ1B2IJAbOo7eUIla4_nAn86wVNLHVE",
  authDomain: "registrosala.firebaseapp.com",
  projectId: "registrosala",
  storageBucket: "registrosala.firebasestorage.app",
  messagingSenderId: "172799882750",
  appId: "1:172799882750:web:4b5eeac5d456393621fcaf",
  measurementId: "G-FXS611JDV3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

async function buscarNotas() {
    const cod = document.getElementById('cod-aluno').value.trim();
    const resDiv = document.getElementById('resultado');
    const erroDiv = document.getElementById('msg-erro');
    
    if(!cod) return;

    // 1. Buscar dados do Aluno
    const alunoSnap = await db.collection("alunos").doc(cod).get();
    
    if(!alunoSnap.exists) {
        resDiv.style.display = "none";
        erroDiv.style.display = "block";
        return;
    }

    erroDiv.style.display = "none";
    const aluno = alunoSnap.data();
    document.getElementById('nome-exibicao').innerText = aluno.nome;
    document.getElementById('turma-exibicao').innerText = aluno.turma;

    // 2. Buscar Atividades daquela Turma
    const ativsSnap = await db.collection("atividades").where("turma", "==", aluno.turma).get();
    let atividades = [];
    ativsSnap.forEach(doc => atividades.push(doc.data()));

    // 3. Buscar Registros (Notas) do Aluno
    const regsSnap = await db.collection("registros").where("cod", "==", cod).get();
    let registros = [];
    regsSnap.forEach(doc => registros.push(doc.data().ativ));

    // 4. Renderizar Tabela
    const tbody = document.getElementById('lista-atividades');
    tbody.innerHTML = "";
    let realizados = 0;

    atividades.forEach(ativ => {
        const feito = registros.includes(ativ.nome);
        if(feito) realizados++;
        
        tbody.innerHTML += `
            <tr>
                <td>${ativ.nome}</td>
                <td style="text-align: center;">${feito ? '<span class="check">✅ Feito</span>' : '<span class="pendente">❌ Pendente</span>'}</td>
            </tr>
        `;
    });

    const media = atividades.length > 0 ? ((realizados / atividades.length) * 10).toFixed(1) : "0.0";
    document.getElementById('media-exibicao').innerText = `Média: ${media}`;
    resDiv.style.display = "block";
}
</script>

</body>
</html>
