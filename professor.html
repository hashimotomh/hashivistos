<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor V2 - Modo Rápido</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 15px; font-size: 24px; }
        
        .secao-titulo { font-weight: bold; font-size: 14px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-top: 15px; }
        
        /* Caixa de Texto do Conteúdo */
        .input-conteudo { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 14px; box-sizing: border-box; transition: border 0.2s; }
        .input-conteudo:focus { border-color: #34495e; outline: none; }

        /* Layout das Ocorrências */
        .grid-ocorrencias { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .btn-acao { padding: 12px 8px; border: 2px solid #bdc3c7; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        /* Cores das ações quando selecionadas */
        .btn-pos.ativo { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; transform: scale(1.03); box-shadow: 0 4px 10px rgba(46,204,113,0.3); }
        .btn-neg.ativo { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; transform: scale(1.03); box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
        .btn-pos:hover { border-color: #2ecc71; background: #f4fbf7; }
        .btn-neg:hover { border-color: #e74c3c; background: #fdf5f5; }
        .xp-tag { font-size: 11px; opacity: 0.8; margin-top: 3px; }

        /* Layout dos Alunos */
        .grid-alunos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .btn-aluno { padding: 15px 10px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; text-align: left; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; }
        .btn-aluno:hover { background-color: #e2e7e9; transform: translateY(-2px); }
        .btn-aluno:active { transform: translateY(0); }
        
        /* Animação de clique com sucesso */
        @keyframes piscarSucesso {
            0% { background-color: #2ecc71; color: white; }
            100% { background-color: #ecf0f1; color: #333; }
        }
        .piscar { animation: piscarSucesso 0.6s ease-out; }

        /* Rodapé de Status */
        .barra-status { margin-top: 20px; padding: 12px; background: #34495e; color: white; border-radius: 6px; font-size: 14px; text-align: center; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
	<div id="login-professor-box" style="max-width: 400px; margin: 40px auto; background: #fff; padding: 25px; border-radius: 8px; border: 1px solid #cbd5e1; text-align: center;">
        <h2 style="margin-top:0; color:#34495e;">Login do Professor</h2>
        <input type="email" id="email-prof" placeholder="Seu e-mail do Firebase" class="input-conteudo" style="margin-bottom: 10px; text-align: center;">
        <input type="password" id="senha-prof" placeholder="Sua senha do Firebase" class="input-conteudo" style="margin-bottom: 15px; text-align: center;">
        <button onclick="fazerLoginProfessor()" style="width: 100%; padding: 12px; background-color: #34495e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">Entrar no Painel</button>
        <p id="erro-login-prof" style="color:#e74c3c; display:none; font-weight:bold; margin-top:10px; font-size:13px;"></p>
    </div>

    <div id="painel-professor-conteudo" style="display: none;">
    <h1>Painel de Controle Gamificado ⚡</h1>
    
    <div class="secao-titulo">Conteúdo da Aula (Opcional)</div>
    <div>
        <input type="text" id="conteudo-aula" placeholder="Ex: Equações de 2º Grau / Leitura do capítulo 3" class="input-conteudo">
    </div>
    
    <div class="secao-titulo">1. Selecione a Ocorrência Ativa</div>
    <div class="grid-ocorrencias">
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Lição Concluída', 15)">
            <span>📝 Lição Casa</span><span class="xp-tag">+15 XP</span>
        </button>
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Participação Ativa', 10)">
            <span>🙋 Participação</span><span class="xp-tag">+10 XP</span>
        </button>
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Tirou Dúvida', 10)">
            <span>💡 Tirou Dúvida</span><span class="xp-tag">+10 XP</span>
        </button>
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Material Completo', 5)">
            <span>🎒 Material Ok</span><span class="xp-tag">+5 XP</span>
        </button>
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Foco e Producão', 10)">
            <span>🎯 Foco Total</span><span class="xp-tag">+10 XP</span>
        </button>
        <button class="btn-acao btn-pos" onclick="selecionarOcorrencia(this, 'Colaboração Extra', 20)">
            <span>🤝 Trabalho Equipe</span><span class="xp-tag">+20 XP</span>
        </button>

        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Lição Incompleta', -15)">
            <span>❌ Sem Lição</span><span class="xp-tag">-15 XP</span>
        </button>
        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Excesso de Conversa', -10)">
            <span>💬 Conversa</span><span class="xp-tag">-10 XP</span>
        </button>
        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Atrapalhou a Aula', -10)">
            <span>🛑 Atrapalhou</span><span class="xp-tag">-10 XP</span>
        </button>
        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Bagunça / Distração', -15)">
            <span>🏃 Bagunça</span><span class="xp-tag">-15 XP</span>
        </button>
        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Uso de Celular', -10)">
            <span>📱 Celular</span><span class="xp-tag">-10 XP</span>
        </button>
        <button class="btn-acao btn-neg" onclick="selecionarOcorrencia(this, 'Sem Material', -5)">
            <span>✏️ Sem Material</span><span class="xp-tag">-5 XP</span>
        </button>
    </div>

    <div class="secao-titulo">2. Clique no Aluno para Computar</div>
    <div class="grid-alunos">
        <button class="btn-aluno" onclick="computarPonto(this, '1001', 'ALYCE FERNANDA CASONI DO NASCIMENTO')"><span>1. Alyce F.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1002', 'ANA CLARA FERREIRA DE OLIVEIRA')"><span>2. Ana Clara</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1003', 'ANA JÚLIA DANGL TABET')"><span>3. Ana Júlia</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1004', 'ANGEL RUBEN HIGUERA MARCANO')"><span>4. Angel R.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1005', 'ARTHUR ESCHEMBACH SILVA')"><span>5. Arthur E.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1006', 'BRUNO MIGUEL FRANCO DE MORAES')"><span>6. Bruno M.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1007', 'CLARA REIS FERNANDES DO VALE')"><span>7. Clara R.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1008', 'DAFNE LOMES PACIENCIA')"><span>8. Dafne L.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1009', 'DAVI LUCCA LEME DE SOUZA')"><span>9. Davi Lucca</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1010', 'DAVI SANTOS DAMO')"><span>10. Davi S.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1011', 'EVELLYN DE OLIVEIRA BERTANE')"><span>11. Evellyn O.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1012', 'GIOVANA CUNHA MOTA')"><span>12. Giovana C.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1013', 'GUILHERME DONATO MATTOS DE PAULA')"><span>13. Guilherme D.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1014', 'HEITOR DANIEL DE CAMARGO SILVA')"><span>14. Heitor D.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1015', 'ISAAC MATHEUS SANTOS DA SILVA')"><span>15. Isaac M.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1016', 'ISABELLY COLONIA DE SOUZA')"><span>16. Isabelly C.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1017', 'IZABELLE COSTA SANTOS')"><span>17. Izabelle C.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1018', 'JASMINY KARLA SANTANA DE ALMEIDA')"><span>18. Jasminy K.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1019', 'JULIO VINICIUS PALMEIRA GHIRARDELLI')"><span>19. Julio V.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1020', 'KAUÃ AUGUSTO DE SOUZA')"><span>20. Kauã A.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1021', 'LORENZO SANTOS SAVI')"><span>21. Lorenzo S.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1022', 'MARIA CLARA LEMOS ALMEIDA')"><span>22. Maria Clara</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1023', 'MIGUEL HENRIQUE BOONEN EUGENIO')"><span>23. Miguel H.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1024', 'MURILO HENRIQUE DA SILVA CITRAN')"><span>24. Murilo H.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1025', 'NICOLAS RAFAEL DIONISIO TRIQUEIROS')"><span>25. Nicolas R.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1026', 'OLIVIA FERREIRA PRESTES')"><span>26. Olivia F.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1027', 'OTÁVIO BARBOSA SILVA')"><span>27. Otávio B.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1028', 'PIETRA LABELLA MOREIRA SANTOS')"><span>28. Pietra L.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1029', 'RYAN LUCAS NASCIMENTO SANTOS')"><span>29. Ryan L.</span></button>
        <button class="btn-aluno" onclick="computarPonto(this, '1030', 'SOFIA DA COSTA AMPARO')"><span>30. Sofia C.</span></button>
    </div>

    <div class="barra-status" id="status">Aguardando seleção de ocorrência...</div>
</div>

<script>
    // Configurações do seu Firebase (Cole aqui as chaves do seu projeto)
    const firebaseConfig = {
  apiKey: "AIzaSyBtY3gnLGcX9biqtgy9Um7C2e1Y21-DSP8",
  authDomain: "gamificacao-hashi.firebaseapp.com",
  projectId: "gamificacao-hashi",
  storageBucket: "gamificacao-hashi.firebasestorage.app",
  messagingSenderId: "1019383886413",
  appId: "1:1019383886413:web:a954f277e096ceef036204",
  measurementId: "G-XJR45JGEGF"
};
    
    // Inicializar o Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth(); // <--- Força a criação da instância de autenticação aqui

    // Função para autenticar o professor antes de liberar o painel
    async function fazerLoginProfessor() {
        const email = document.getElementById("email-prof").value.trim();
        const senha = document.getElementById("senha-prof").value.trim();
        const erro = document.getElementById("erro-login-prof");

        try {
            // Usa a instância direta 'auth' que criamos lá em cima
            await auth.signInWithEmailAndPassword(email, senha);
            
            // Se der certo, oculta a tela de login e mostra o painel de pontos
            document.getElementById("login-professor-box").style.display = "none";
            document.getElementById("painel-professor-conteudo").style.display = "block";
            document.getElementById("status").innerText = "Aguardando seleção de ocorrência...";
        } catch (e) {
            erro.innerText = "Falha na autenticação: " + e.message;
            erro.style.display = "block";
        }
    }

    // Variáveis globais para armazenar o estado selecionado
    let acaoAtivaMotivo = "";
    let acaoAtivaXP = 0;

    function selecionarOcorrencia(botao, motivo, xp) {
        // Remove o destaque visual de todos os botões de ação
        document.querySelectorAll('.btn-acao').forEach(b => b.classList.remove('ativo'));
        
        // Aplica o destaque no botão selecionado
        botao.classList.add('ativo');
        
        // Define as variáveis globais
        acaoAtivaMotivo = motivo;
        acaoAtivaXP = xp;
        
        const statusTxt = `PRONTO: Clique nos alunos para aplicar [ ${motivo} (${xp > 0 ? '+' : ''}${xp} XP) ]`;
        document.getElementById("status").innerText = statusTxt;
    }

    async function computarPonto(botaoAluno, id, nomeCompleto) {
        if (!acaoAtivaMotivo) {
            document.getElementById("status").innerText = "⚠️ ERRO: Selecione uma ocorrência no topo primeiro!";
            return;
        }

        const conteudoAula = document.getElementById("conteudo-aula").value.trim();
        document.getElementById("status").innerText = `💾 Gravando para ${nomeCompleto}...`;

        try {
            const alunoRef = db.collection("alunos").doc(id);
            
            await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(alunoRef);
                let novoXp = acaoAtivaXP;
                
                if (doc.exists) {
                    novoXp = (doc.data().xp_atual || 0) + acaoAtivaXP;
                    if(novoXp < 0) novoXp = 0; // Proteção contra XP negativo
                    transaction.update(alunoRef, { xp_atual: novoXp, nome: nomeCompleto });
                } else {
                    if(novoXp < 0) novoXp = 0;
                    transaction.set(alunoRef, { nome: nomeCompleto, xp_atual: novoXp, pin: "1234" });
                }

                // Cria o registro no histórico salvando o Conteúdo da Aula digitado
                const historicoRef = db.collection("historico").doc();
                transaction.set(historicoRef, {
                    aluno_id: id,
                    motivo: acaoAtivaMotivo,
                    quantidade: acaoAtivaXP,
                    conteudo: conteudoAula || "Conteúdo não especificado",
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
            });

            // Efeito visual rápido de piscar verde para confirmar o clique
            botaoAluno.classList.add('piscar');
            setTimeout(() => botaoAluno.classList.remove('piscar'), 600);

            document.getElementById("status").innerText = `✅ Sucesso! ${acaoAtivaMotivo} computado para ${nomeCompleto}.`;
            
            // Restaura o texto informativo para manter o fluxo contínuo de cliques
            setTimeout(() => {
                if(acaoAtivaMotivo) {
                    document.getElementById("status").innerText = `PRONTO: Clique nos alunos para aplicar [ ${acaoAtivaMotivo} (${acaoAtivaXP > 0 ? '+' : ''}${acaoAtivaXP} XP) ]`;
                }
            }, 1500);

        } catch (error) {
            document.getElementById("status").innerText = `❌ Erro: ${error.message}`;
        }
    }
</script>
</body>
</html>
