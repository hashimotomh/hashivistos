<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor V3 - Com Relatórios PDF</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; margin-top: 0; margin-bottom: 15px; font-size: 24px; }
        
        .secao-titulo { font-weight: bold; font-size: 14px; color: #7f8c8d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; border-bottom: 2px solid #ecf0f1; padding-bottom: 5px; margin-top: 15px; }
        
        /* Layout das Ocorrências */
        .grid-ocorrencias { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .btn-acao { padding: 12px 8px; border: 2px solid #bdc3c7; border-radius: 8px; background: #fff; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        .btn-pos.ativo { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; transform: scale(1.03); box-shadow: 0 4px 10px rgba(46,204,113,0.3); }
        .btn-neg.ativo { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; transform: scale(1.03); box-shadow: 0 4px 10px rgba(231,76,60,0.3); }
        .btn-pos:hover { border-color: #2ecc71; background: #f4fbf7; }
        .btn-neg:hover { border-color: #e74c3c; background: #fdf5f5; }
        .xp-tag { font-size: 11px; opacity: 0.8; margin-top: 3px; }

        /* Layout dos Alunos */
        .grid-alunos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .btn-aluno { padding: 15px 10px; background-color: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; text-align: left; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; text-transform: uppercase; }
        .btn-aluno:hover { background-color: #e2e7e9; transform: translateY(-2px); }
        
        @keyframes piscarSucesso {
            0% { background-color: #2ecc71; color: white; }
            100% { background-color: #ecf0f1; color: #333; }
        }
        .piscar { animation: piscarSucesso 0.6s ease-out; }
        .barra-status { margin-top: 20px; padding: 10px; background: #34495e; color: white; border-radius: 6px; font-size: 14px; text-align: center; font-weight: bold; min-height: 20px; }

        /* Area de Ferramentas de Relatório */
        .painel-relatorios { display: flex; flex-wrap: wrap; gap: 15px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; }
        .select-relatorio { flex: 1; min-width: 200px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; }
        .btn-pdf { padding: 10px 15px; background-color: #9b59b6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-pdf:hover { background-color: #8e44ad; }

        /* Estilos específicos da folha impressa (Escondido na tela comum) */
        #area-impressao { display: none; font-family: Arial, sans-serif; padding: 30px; color: #000; }
        .pdf-header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; text-align: center; }
        .pdf-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .pdf-table th, .pdf-table td { border: 1px solid #ddd; padding: 8px; text-align: left; font-size: 13px; }
        .pdf-table th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div id="area-impressao"></div>

<script>
    // COLOQUE SUAS CHAVES DO FIREBASE AQUI 
    const firebaseConfig = {
  apiKey: "AIzaSyBtY3gnLGcX9biqtgy9Um7C2e1Y21-DSP8",
  authDomain: "gamificacao-hashi.firebaseapp.com",
  projectId: "gamificacao-hashi",
  storageBucket: "gamificacao-hashi.firebasestorage.app",
  messagingSenderId: "1019383886413",
  appId: "1:1019383886413:web:a954f277e096ceef036204",
  measurementId: "G-XJR45JGEGF"
};
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let acaoAtivaMotivo = "";
    let acaoAtivaXP = 0;

    function selecionarOcorrencia(botao, motivo, xp) {
        document.querySelectorAll('.btn-acao').forEach(b => b.classList.remove('ativo'));
        botao.classList.add('ativo');
        acaoAtivaMotivo = motivo;
        acaoAtivaXP = xp;
        document.getElementById("status").innerText = `PRONTO: Clique nos alunos para aplicar [ ${motivo} (${xp > 0 ? '+' : ''}${xp} XP) ]`;
    }

    async function computarPonto(botaoAluno, id, nomeCompleto) {
        if (!acaoAtivaMotivo) {
            document.getElementById("status").innerText = "⚠️ ERRO: Selecione uma ocorrência no topo primeiro!";
            return;
        }

        document.getElementById("status").innerText = `💾 Gravando para ${nomeCompleto}...`;

        try {
            const alunoRef = db.collection("alunos").doc(id);
            const conteudoAula = document.getElementById("conteudo-aula").value.trim();
            
            await db.runTransaction(async (transaction) => {
                const doc = await transaction.get(alunoRef);
                let novoXp = acaoAtivaXP;
                
                if (doc.exists) {
                    novoXp = (doc.data().xp_atual || 0) + acaoAtivaXP;
                    if(novoXp < 0) novoXp = 0;
                    transaction.update(alunoRef, { xp_atual: novoXp });
                } else {
                    if(novoXp < 0) novoXp = 0;
                    transaction.set(alunoRef, { nome: nomeCompleto, xp_atual: novoXp, pin: "1234" });
                }

                const historicoRef = db.collection("historico").doc();
                transaction.set(historicoRef, {
                    aluno_id: id,
                    motivo: acaoAtivaMotivo,
                    quantidade: acaoAtivaXP,
                    conteudo: conteudoAula || "Conteúdo não especificado",
                    data: firebase.firestore.FieldValue.serverTimestamp()
                });
            });

            botaoAluno.classList.add('piscar');
            setTimeout(() => botaoAluno.classList.remove('piscar'), 600);
            document.getElementById("status").innerText = `✅ Sucesso! ${acaoAtivaMotivo} computado para ${nomeCompleto}.`;
            
            setTimeout(() => {
                if(acaoAtivaMotivo) {
                    document.getElementById("status").innerText = `PRONTO: Clique nos alunos para aplicar [ ${acaoAtivaMotivo} (${acaoAtivaXP > 0 ? '+' : ''}${acaoAtivaXP} XP) ]`;
                }
            }, 1500);

        } catch (error) {
            document.getElementById("status").innerText = `❌ Erro: ${error.message}`;
        }
    }

    // ==========================================
    // NOVA FUNÇÃO: MOTOR GERADOR DE PDF
    // ==========================================
    async function gerarPDF() {
        const selecao = document.getElementById("select-aluno-relatorio").value;
        const area = document.getElementById("area-impressao");
        document.getElementById("status").innerText = "⏳ Coletando dados do banco para o PDF...";
        
        area.innerHTML = ""; // Limpa rascunhos anteriores
        
        let nomeArquivo = "Relatorio.pdf";

        if (selecao === "GERAL") {
            nomeArquivo = "Relatorio_Geral_Turma.pdf";
            try {
                const snapshot = await db.collection("alunos").get();
                if(snapshot.empty) { alert("Nenhum aluno cadastrado no banco."); return; }
                
                let listaAlunos = [];
                snapshot.forEach(doc => {
                    listaAlunos.push({ id: doc.id, ...doc.data() });
                });
                
                // Ordena alfabeticamente para a lista impressa ficar organizada
                listaAlunos.sort((a,b) => a.nome.localeCompare(b.nome));

                let htmlContent = `
                    <div class="pdf-header">
                        <h2>RELATÓRIO GERAL DE EXPERIÊNCIA (XP)</h2>
                        <p>Status Geral da Sala de Aula | Data de Emissão: ${new Date().toLocaleDateString('pt-BR')}</p>
                    </div>
                    <table class="pdf-table">
                        <thead>
                            <tr>
                                <th style="width: 15%">Código ID</th>
                                <th>Nome Completo do Aluno</th>
                                <th style="width: 20%; text-align: center;">XP Total</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                listaAlunos.forEach(aluno => {
                    htmlContent += `
                        <tr>
                            <td>${aluno.id}</td>
                            <td>${aluno.nome}</td>
                            <td style="text-align: center; font-weight: bold;">${aluno.xp_atual || 0} XP</td>
                        </tr>
                    `;
                });

                htmlContent += `</tbody></table>`;
                area.innerHTML = htmlContent;

            } catch(e) {
                alert("Erro ao montar relatório geral: " + e.message);
                return;
            }

        } else {
            // Relatório Individualizado por Aluno
            nomeArquivo = `Relatorio_Individual_${selecao}.pdf`;
            try {
                const alunoDoc = await db.collection("alunos").doc(selecao).get();
                if (!alunoDoc.exists) { 
                    alert("Este aluno ainda não possui pontuações registradas."); 
                    return; 
                }
                
                const dadosAluno = alunoDoc.data();
                
                // Busca o histórico de ações dele
                const historicoSnapshot = await db.collection("historico").where("aluno_id", "==", selecao).get();
                
                let historicoItens = [];
                historicoSnapshot.forEach(doc => { historicoItens.push(doc.data()); });
                
                // Ordena o PDF do mais recente para o mais antigo
                historicoItens.sort((a,b) => (b.data ? b.data.toDate() : 0) - (a.data ? a.data.toDate() : 0));

                let htmlContent = `
                    <div class="pdf-header">
                        <h2>EXTRATO PEDAGÓGICO INDIVIDUAL</h2>
                        <p>Acompanhamento de Evolução por Atitudes e Engajamento</p>
                    </div>
                    <div style="margin-bottom: 20px; font-size: 14px; background: #f9f9f9; padding: 10px; border-left: 4px solid #34495e;">
                        <b>Aluno:</b> ${dadosAluno.nome}<br>
                        <b>Código Identificador:</b> ${selecao}<br>
                        <b>Pontuação de Experiência Atual:</b> <span style="color:#27ae60; font-weight:bold;">${dadosAluno.xp_atual || 0} XP</span>
                    </div>
                    <h3>Histórico de Ocorrências:</h3>
                    <table class="pdf-table">
                        <thead>
                            <tr>
                                <th style="width: 25%">Data / Hora</th>
                                <th>Ação / Atitude Detectada</th>
                                <th>Conteúdo da Aula</th>
                                <th style="width: 15%">Impacto</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                if(historicoItens.length === 0) {
                    htmlContent += `<tr><td colspan="4" style="text-align:center; color:#777;">Nenhuma ocorrência registrada para este aluno.</td></tr>`;
                } else {
                    historicoItens.forEach(item => {
                        let dataStr = "Sem data";
                        if(item.data) {
                            const d = item.data.toDate();
                            dataStr = d.toLocaleDateString('pt-BR') + " às " + d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                        }
                        const sinal = item.quantidade > 0 ? "+" : "";
                        const cor = item.quantidade > 0 ? "green" : "red";
                        
                        htmlContent += `
                            <tr>
                                <td>${dataStr}</td>
                                <td>${item.motivo}</td>
                                <td><i>${item.conteudo || "Não especificado"}</i></td>
                                <td style="color: ${cor}; font-weight: bold;">${sinal}${item.quantidade} XP</td>
                            </tr>
                        `;
                    });
                }

                htmlContent += `</tbody></table>`;
                area.innerHTML = htmlContent;

            } catch(e) {
                alert("Erro ao montar relatório individual: " + e.message);
                return;
            }
        }

        // Configuração e disparo da biblioteca html2pdf
        const configuracaoOpt = {
            margin:       15,
            filename:     nomeArquivo,
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Roda a conversão e faz o download automático
        html2pdf().set(configuracaoOpt).from(area).save().then(() => {
            document.getElementById("status").innerText = "✅ PDF gerado e baixado com sucesso!";
        });
    }
</script>
</body>
</html>
